name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-workflows:
    name: Lint workflow files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint all example workflows
        run: |
          failed=0
          for f in assets/examples/*.js; do
            echo "Linting $f ..."
            node scripts/validate-workflow.mjs "$f" || failed=1
          done
          exit $failed

  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check evals/evals.json
        run: node -e "JSON.parse(require('fs').readFileSync('evals/evals.json', 'utf8')); console.log('evals/evals.json OK')"

      - name: Check examples/cross-platform/portable-skill-spec.json
        run: node -e "JSON.parse(require('fs').readFileSync('examples/cross-platform/portable-skill-spec.json', 'utf8')); console.log('portable-skill-spec.json OK')"

      - name: Validate portable runtime contract
        run: node scripts/validate-portable-spec.mjs examples/cross-platform/portable-skill-spec.json

  validate-runtime-plugin:
    name: Validate runtime plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Smoke-test runtime-file-backed-plugin.mjs
        run: node scripts/validate-runtime-plugin.mjs
