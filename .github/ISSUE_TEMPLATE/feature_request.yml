name: Feature request
description: Suggest a new example workflow, pattern, cross-platform adapter, or skill improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or gap this addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New example workflow
        - New orchestration pattern
        - Cross-platform adapter
        - SKILL.md / authoring procedure
        - API reference / documentation
        - Linter / scripts
        - Eval test cases
        - Other
    validations:
      required: true
